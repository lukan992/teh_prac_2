dataset_name: synthetic_v1
seed: 42
sample_rate_hz: 10
trajectory_count: 1000
trajectory_length_min: 80
trajectory_length_max: 200
segment_length: 50
segment_stride: 25
forecast_horizons_steps: [5, 10, 20, 30]
train_fraction: 0.7
val_fraction: 0.15
pointcloud_frames_per_trajectory: 12
pointcloud_background_points: 24
missing_point_probability:
  clean: 0.02
  medium: 0.08
  hard: 0.18
noise_levels:
  clean:
    position_std: 0.12
    drop_probability: 0.01
    false_clusters: 1
  medium:
    position_std: 0.35
    drop_probability: 0.05
    false_clusters: 2
  hard:
    position_std: 0.7
    drop_probability: 0.12
    false_clusters: 3
patterns:
  - straight_flight
  - circular_orbit
  - rectangular_patrol
  - hover
  - spiral_climb
  - zigzag
  - sharp_turn
  - descent_approach
  - random_anomalous
